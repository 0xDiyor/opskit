name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Lint with PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize | Out-String | Write-Output
          if ($results) {
            Write-Output "PSScriptAnalyzer found $(@($results).Count) issue(s)."
            exit 1
          }
          Write-Output "PSScriptAnalyzer: clean."

      - name: Smoke test (Windows PowerShell 5.1)
        shell: powershell
        run: ./tests/smoke.ps1
